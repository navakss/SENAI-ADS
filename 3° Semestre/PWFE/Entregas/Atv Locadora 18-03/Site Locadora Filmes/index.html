<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora - Filmes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="assets/logo locadora sem fundo.png" alt="logo" width="50" class="me-2">
                <span class="fw-bold">Tela Play</span>
            </a>
            <button class="btn btn-light fw-bold" data-bs-toggle="modal" data-bs-target="#modalFilme">
                + Novo Filme
            </button>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-danger text-center">
                            <tr>
                                <th>Capa</th>
                                <th>Nome</th>
                                <th>Gênero</th>
                                <th>Autor(a)</th>
                                <th>Lançamento</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="dados" class="text-center align-middle">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalFilme" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="modalLabel">Cadastrar Novo Filme</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formFilme">
                        <div class="mb-3">
                            <label class="form-label">URL da Capa</label>
                            <input type="url" id="capa" class="form-control" placeholder="https://...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nome do Filme</label>
                            <input type="text" id="nome" class="form-control" placeholder="Ex: Interestelar">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Gênero</label>
                                <input type="text" id="genero" class="form-control" placeholder="Ficção">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Autor(a)</label>
                                <input type="text" id="autor" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Data de Lançamento</label>
                            <input type="date" id="lancamento" class="form-control">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" onclick="salvarCliente()">Salvar Filme</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
