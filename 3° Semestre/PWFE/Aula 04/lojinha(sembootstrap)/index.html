<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Minha Lojinha</title>
</head>
<body>
    <nav class="navbar">
        <div class="logo">TechStore</div>
        <ul class="links">
            <li> Home </li>
            <li> Produtos </li>
        </ul>
    </nav>

    <header class="ofertas">
        <h1>As Melhores Ofertas!</h1>
    </header>

    <main class="container">
        <div class="grid-produtos">
            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQmuxTJFJpoRncLlOTlDV26D3k9bKtjJb7D8g&s" alt="Produtos">
                <h3>Smartphone Samsung S26</h3>
                <p>R$ 5.000,00</p>
                <button class="btn-comprar">Comprar</button>
            </div>

            <div class="card">
                <img src="https://cdn.awsli.com.br/600x450/241/241991/produto/302110171/71-wuld5s0x3a.png" alt="Produtos">
                <h3>Playstation 5</h3>
                <p>R$ 4.000,00</p>
                <button class="btn-comprar">Comprar</button>
            </div>
        </div>
    </main>

</html>
