<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kaboom</title>
</head>
<body>
    <header>
        <img src="assets/logo.png" alt="logo">   
        <button onclick="AbrirModal()">
            Adicionar Produto
        </button>
    </header>

    <h2>Catálogo</h2>

    <div class="container" style="display: none;">
        <div class="cards">
            </div>
    </div>

    <div id="modal-container" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="FecharModal()">&times;</span>
            <h2>Cadastrar Novo Produto</h2>
            
            <div class="modal-inserts">
                <label for="nome-produto">Nome do Produto:</label> 
                <input type="text" id="nome-produto" placeholder="Ex: Teclado Mecânico">

                <label for="imagem-produto">URL da Imagem:</label> 
                <input type="text" id="imagem-produto" placeholder="https://link-da-imagem.com">

                <label for="valor-produto">Preço (R$):</label> 
                <input type="number" id="valor-produto" placeholder="0.00">
            </div>

            <button class="btn-adicionar" onclick="AdicionarProduto()">
                Adicionar ao Catálogo
            </button>
        </div>
    </div> <footer>
        <p>© 2026 Kaboom. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
